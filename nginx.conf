server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://dgalywyr863hv.cloudfront.net https://lh3.googleusercontent.com; connect-src 'self' https://www.strava.com https://*.up.railway.app; frame-ancestors 'none';" always;

    # SPA-Routing: unbekannte Pfade → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets lange cachen
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Kein Cache für index.html
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
